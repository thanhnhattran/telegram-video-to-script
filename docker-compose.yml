services:
  bot:
    build: .
    container_name: video-to-script-bot
    restart: unless-stopped
    env_file: .env
    tmpfs:
      - /tmp/video-to-script:size=512m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
